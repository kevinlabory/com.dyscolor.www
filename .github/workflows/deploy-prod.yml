name: Deploy — Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false  # ne jamais annuler un deploy prod en cours

jobs:
  deploy:
    name: sst deploy production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Cache du runtime Pulumi téléchargé par `sst install` (~100 MB)
      - name: Cache SST runtime
        uses: actions/cache@v4
        with:
          path: .sst/platform
          key: sst-platform-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: sst-platform-${{ runner.os }}-

      - name: Install SST runtime
        run: npx sst install

      - name: Deploy
        run: npx sst deploy --stage production
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: eu-west-3
