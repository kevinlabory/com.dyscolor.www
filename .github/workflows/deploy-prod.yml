name: Deploy — Production

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false  # ne jamais annuler un deploy prod en cours

jobs:
  deploy:
    name: sst deploy production
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write   # requis pour l'authentification OIDC
      contents: read

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      # Cache du runtime Pulumi téléchargé par `sst install` (~100 MB)
      - name: Cache SST runtime
        uses: actions/cache@v4
        with:
          path: .sst/platform
          key: sst-platform-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: sst-platform-${{ runner.os }}-

      - name: Install SST runtime
        run: npx sst install

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: eu-west-3

      - name: Refresh SST state
        run: npx sst refresh --stage production
        continue-on-error: true
        env:
          ALERT_EMAIL: ${{ vars.ALERT_EMAIL }}

      - name: Deploy
        run: npx sst deploy --stage production
        env:
          ALERT_EMAIL: ${{ vars.ALERT_EMAIL }}
