name: Deploy — Dev (preview PR)

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: deploy-dev-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true  # annule le deploy précédent si un nouveau push arrive

jobs:
  deploy:
    name: sst deploy dev
    runs-on: ubuntu-latest
    # Ne pas déployer si la PR est fermée sans merge (suppression déclenchée séparément)
    if: github.event.action != 'closed'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache SST runtime
        uses: actions/cache@v4
        with:
          path: .sst/platform
          key: sst-platform-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: sst-platform-${{ runner.os }}-

      - name: Install SST runtime
        run: npx sst install

      - name: Deploy
        id: deploy
        run: |
          OUTPUT=$(npx sst deploy --stage dev 2>&1)
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -oP 'https://[a-z0-9]+\.cloudfront\.net' | head -1)
          echo "url=$URL" >> $GITHUB_OUTPUT
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: eu-west-3

      - name: Post preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            const body = url
              ? `### 🔍 Preview déployé\n\n**URL** : ${url}\n\n> Environnement \`dev\` — détruit automatiquement à la fermeture de la PR.`
              : `### ✅ Deploy dev terminé`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

  # Supprime l'environnement dev quand la PR est fermée
  teardown:
    name: sst remove dev
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache SST runtime
        uses: actions/cache@v4
        with:
          path: .sst/platform
          key: sst-platform-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: sst-platform-${{ runner.os }}-

      - name: Install SST runtime
        run: npx sst install

      - name: Remove dev environment
        run: npx sst remove --stage dev
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: eu-west-3
